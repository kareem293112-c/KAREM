<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Definitions for gradients and drop shadows -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b" /> <!-- indigo-950 -->
      <stop offset="100%" stop-color="#312e81" /> <!-- indigo-900 -->
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fbbf24" /> <!-- amber-400 -->
      <stop offset="100%" stop-color="#b45309" /> <!-- amber-700 -->
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" /> <!-- indigo-500 -->
      <stop offset="100%" stop-color="#a855f7" /> <!-- purple-500 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Smooth rounded square background (squircle vibe) -->
  <rect x="24" y="24" width="464" height="464" rx="108" fill="url(#bgGrad)" stroke="#4338ca" stroke-width="8" />

  <!-- Abstract sleek bar charts representing growth -->
  <g transform="translate(110, 140)">
    <!-- Column 1 -->
    <rect x="0" y="160" width="36" height="100" rx="12" fill="#4f46e5" opacity="0.4" />
    <!-- Column 2 -->
    <rect x="56" y="100" width="36" height="160" rx="12" fill="#6366f1" opacity="0.6" />
    <!-- Column 3 -->
    <rect x="112" y="40" width="36" height="220" rx="12" fill="url(#accentGrad)" filter="url(#glow)" />
    <!-- Column 4 -->
    <rect x="168" y="120" width="36" height="140" rx="12" fill="#a855f7" opacity="0.8" />
  </g>

  <!-- Golden coin representing financial calculations -->
  <circle cx="360" cy="340" r="68" fill="url(#goldGrad)" filter="url(#glow)" stroke="#fef08a" stroke-width="4" />
  <!-- Inner detailing for the coin -->
  <circle cx="360" cy="340" r="48" fill="none" stroke="#f59e0b" stroke-width="4" stroke-dasharray="10 6" />
  <!-- Mathematical / Currency symbol inside coin (Islamic / Global Coin vibe) -->
  <path d="M344 322 H376 M344 338 H376 M348 354 C348 354 354 366 368 360" fill="none" stroke="#fef08a" stroke-width="6" stroke-linecap="round" />
  <path d="M356 312 V368" fill="none" stroke="#fef08a" stroke-width="6" stroke-linecap="round" />

  <!-- Smooth connecting neon line graph -->
  <path d="M128 300 L184 240 L240 180 L296 260 L360 210" fill="none" stroke="#f472b6" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  <circle cx="360" cy="210" r="10" fill="#f472b6" />
</svg>
